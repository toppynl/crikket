services:
  caddy:
    image: caddy:2.10-alpine
    container_name: crikket-caddy
    restart: unless-stopped
    env_file:
      - ./.env
      - ./apps/web/.env
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    networks:
      default:
        aliases:
          - "${CADDY_PUBLIC_HOST}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
